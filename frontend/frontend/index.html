<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>Ghitzcare — DJs, Streets, Live Bands, Fashion & Food</title>
    <meta name="description" content="Ghitzcare is a culture collective bringing together DJs, street life, live bands, fashion and food in one immersive visual experience." />
    <meta name="author" content="Ghitzcare" />
    <meta name="keywords" content="Ghitzcare, DJs, live bands, street culture, fashion, food, music, nightlife, culture collective" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />
    <link rel="canonical" href="https://example.com/" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ghitzcare" />
    <meta property="og:title" content="Ghitzcare — DJs, Streets, Live Bands, Fashion & Food" />
    <meta property="og:description" content="A culture collective bringing together DJs, street life, live bands, fashion and food in one immersive visual experience." />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:image" content="https://example.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ghitzcare — DJs, Streets, Live Bands, Fashion & Food" />
    <meta name="twitter:description" content="A culture collective bringing together DJs, street life, live bands, fashion and food." />
    <meta name="twitter:image" content="https://example.com/og-image.jpg" />

    <!-- Fonts (preconnect + the display/utility faces the UI actually uses) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda+SC:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter+Tight:wght@400;500;700;900&display=swap"
    />

    <!-- Preload the first hero image so the gallery paints instantly -->
    <link rel="preload" as="image" href="/images/djs/wildchild-1440.webp" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Ghitzcare",
        "url": "https://example.com/",
        "logo": "https://example.com/apple-touch-icon.png",
        "description": "A culture collective bringing together DJs, street life, live bands, fashion and food."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
